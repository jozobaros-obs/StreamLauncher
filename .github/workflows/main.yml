name: Build StreamLauncher APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android platform & build tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Copy web assets into Android assets folder
        run: |
          mkdir -p android/app/src/main/assets/css
          mkdir -p android/app/src/main/assets/js
          cp renderer/index.html  android/app/src/main/assets/index.html
          cp renderer/css/app.css android/app/src/main/assets/css/app.css
          cp renderer/js/app.js   android/app/src/main/assets/js/app.js

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamLauncher-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
